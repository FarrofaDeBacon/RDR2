<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fdb-propeditor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 20px;
            pointer-events: none;
            user-select: none;
        }

        #editor-panel {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: rgba(10, 10, 14, 0.88);
            border: 1px solid rgba(255, 200, 80, 0.35);
            border-radius: 6px;
            padding: 14px 18px;
            min-width: 290px;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        /* Header */
        .header {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 4px;
        }
        .label-resource {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(255, 200, 80, 0.7);
            text-transform: uppercase;
        }
        .label-item {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* Stage badge */
        .stage-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .stage-name {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 200, 80, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .stage-counter {
            font-size: 10px;
            color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            padding: 2px 6px;
        }

        /* Coordinates */
        .coords-block {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px 8px;
            padding: 8px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .coord-cell {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .coord-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        .coord-value {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            min-width: 60px;
        }
        .coord-value.rotation { color: rgba(180, 160, 255, 0.9); }

        /* Divider label */
        .divider-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            padding: 2px 0;
        }

        /* Keybind hints */
        .hints {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding-top: 4px;
        }
        .hint-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            color: rgba(255,255,255,0.35);
        }
        .key {
            display: inline-block;
            padding: 1px 5px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 3px;
            font-size: 8px;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            background: rgba(255,255,255,0.04);
            white-space: nowrap;
        }

        /* Active indicator */
        .active-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 200, 80, 0.8);
            box-shadow: 0 0 6px rgba(255, 200, 80, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        /* Search */
        .search-container {
            margin-top: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
        }
        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            color: #fff;
            padding: 6px 8px;
            font-family: inherit;
            font-size: 11px;
            outline: none;
            pointer-events: auto;
        }
        .search-input:focus {
            border-color: rgba(255, 200, 80, 0.6);
        }
        .search-results {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            pointer-events: auto;
        }
        .search-results::-webkit-scrollbar { width: 4px; }
        .search-results::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 2px; }
        .search-item {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            padding: 4px 6px;
            cursor: pointer;
            border-radius: 2px;
        }
        .search-item:hover {
            background: rgba(255, 200, 80, 0.2);
            color: #fff;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* Menu Inicial */
        #init-menu {
            display: none;
            flex-direction: column;
            gap: 12px;
            background: rgba(10, 10, 14, 0.88);
            border: 1px solid rgba(255, 200, 80, 0.35);
            border-radius: 6px;
            padding: 14px 18px;
            min-width: 290px;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            pointer-events: auto;
        }
        .menu-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }
        .menu-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            color: #fff;
            padding: 8px;
            font-family: inherit;
            font-size: 11px;
            outline: none;
            margin-top: 2px;
        }
        .menu-select:focus { border-color: rgba(255, 200, 80, 0.6); }
        .menu-btn {
            background: rgba(255, 200, 80, 0.2);
            border: 1px solid rgba(255, 200, 80, 0.5);
            color: #fff;
            padding: 8px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .menu-btn:hover { background: rgba(255, 200, 80, 0.4); }
    </style>
</head>
<body>
    <div id="init-menu">
        <div class="menu-title">Prop Editor</div>
        <div>
            <label style="font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;">Resource:</label>
            <select id="sel-resource" class="menu-select"></select>
        </div>
        <div>
            <label style="font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;">Item:</label>
            <select id="sel-item" class="menu-select"></select>
        </div>
        <button id="btn-start" class="menu-btn" style="margin-top:4px;">Iniciar Edição</button>
        <button id="btn-cancel" class="menu-btn" style="background:rgba(255,50,50,0.1);border-color:rgba(255,50,50,0.3);">Cancelar</button>
    </div>
    <div id="editor-panel">
        <div class="header">
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="active-dot"></span>
                <span class="label-resource" id="res-label">resource</span>
            </div>
            <span class="label-item" id="item-label">item</span>
        </div>

        <div class="stage-row">
            <span class="stage-name" id="stage-name">—</span>
            <span class="stage-counter" id="stage-counter">1 / 4</span>
        </div>

        <div class="coords-block">
            <div class="divider-label" style="grid-column:1/-1">Posição</div>
            <div class="coord-cell">
                <span class="coord-label">X</span>
                <span class="coord-value" id="val-x">0.000</span>
            </div>
            <div class="coord-cell">
                <span class="coord-label">Y</span>
                <span class="coord-value" id="val-y">0.000</span>
            </div>
            <div class="coord-cell">
                <span class="coord-label">Z</span>
                <span class="coord-value" id="val-z">0.000</span>
            </div>

            <div class="divider-label" style="grid-column:1/-1;margin-top:4px;">Rotação</div>
            <div class="coord-cell">
                <span class="coord-label">RX</span>
                <span class="coord-value rotation" id="val-rx">0.0</span>
            </div>
            <div class="coord-cell">
                <span class="coord-label">RY</span>
                <span class="coord-value rotation" id="val-ry">0.0</span>
            </div>
            <div class="coord-cell">
                <span class="coord-label">RZ</span>
                <span class="coord-value rotation" id="val-rz">0.0</span>
            </div>
        </div>

        <div class="hints">
            <div class="hint-row"><span class="key">WASD</span> Mover — <span class="key">SHIFT+WASD</span> Girar</div>
            <div class="hint-row"><span class="key">PgUp</span><span class="key">PgDn</span> Altura / Pitch Z</div>
            <div class="hint-row"><span class="key">ESPAÇO</span> Trocar estágio — <span class="key">ENTER</span> Print F8</div>
            <div class="hint-row"><span class="key">F</span> Buscar prop (Ativa Mouse) — <span class="key">BACKSPACE</span> Fechar</div>
        </div>

        <div id="search-container" class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Buscar prop (17k)..." />
            <div id="search-results" class="search-results"></div>
        </div>
    </div>

    <script>
        const panel      = document.getElementById('editor-panel');
        const resLabel   = document.getElementById('res-label');
        const itemLabel  = document.getElementById('item-label');
        const stageName  = document.getElementById('stage-name');
        const stageCount = document.getElementById('stage-counter');
        const valX  = document.getElementById('val-x');
        const valY  = document.getElementById('val-y');
        const valZ  = document.getElementById('val-z');
        const valRX = document.getElementById('val-rx');
        const valRY = document.getElementById('val-ry');
        const valRZ = document.getElementById('val-rz');

        function fmt3(v) { return parseFloat(v).toFixed(3); }
        function fmt1(v) { return parseFloat(v).toFixed(1); }

        let allObjects = [];
        const searchContainer = document.getElementById('search-container');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        let supportedResources = {};
        const initMenu = document.getElementById('init-menu');
        const selResource = document.getElementById('sel-resource');
        const selItem = document.getElementById('sel-item');
        const btnStart = document.getElementById('btn-start');
        const btnCancel = document.getElementById('btn-cancel');

        selResource.addEventListener('change', () => {
            const res = selResource.value;
            selItem.innerHTML = '';
            if (supportedResources[res]) {
                supportedResources[res].forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item;
                    opt.textContent = item;
                    selItem.appendChild(opt);
                });
            }
        });

        btnStart.addEventListener('click', () => {
            const res = selResource.value;
            const itm = selItem.value;
            if (res && itm) {
                initMenu.style.display = 'none';
                fetch(`https://${window.GetParentResourceName()}/startEdit`, {
                    method: 'POST',
                    body: JSON.stringify({ resource: res, item: itm })
                });
            }
        });

        btnCancel.addEventListener('click', () => {
            initMenu.style.display = 'none';
            fetch(`https://${window.GetParentResourceName()}/closeMenu`, { method: 'POST', body: '{}' });
        });

        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            searchResults.innerHTML = '';
            if (query.length < 2) return;
            const filtered = allObjects.filter(o => o.toLowerCase().includes(query)).slice(0, 50);
            filtered.forEach(objName => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.textContent = objName;
                div.onclick = function() {
                    fetch(`https://${window.GetParentResourceName()}/changeProp`, {
                        method: 'POST',
                        body: JSON.stringify({ propName: objName })
                    });
                };
                searchResults.appendChild(div);
            });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                fetch(`https://${window.GetParentResourceName()}/closeSearch`, { method: 'POST', body: '{}' });
            }
        });

        window.addEventListener('message', function(event) {
            const data = event.data;

            if (data.action === 'initObjects') {
                allObjects = data.objects || [];
            }

            if (data.action === 'openMenu') {
                supportedResources = data.resources || {};
                selResource.innerHTML = '';
                selItem.innerHTML = '';
                
                let firstRes = null;
                for (const res in supportedResources) {
                    if (!firstRes) firstRes = res;
                    const opt = document.createElement('option');
                    opt.value = res;
                    opt.textContent = res;
                    selResource.appendChild(opt);
                }
                
                if (firstRes) {
                    selResource.value = firstRes;
                    supportedResources[firstRes].forEach(item => {
                        const opt = document.createElement('option');
                        opt.value = item;
                        opt.textContent = item;
                        selItem.appendChild(opt);
                    });
                }
                
                initMenu.style.display = 'flex';
                panel.style.display = 'none';
                searchContainer.style.display = 'none';
            }

            if (data.action === 'toggleSearch') {
                if (data.state) {
                    searchContainer.style.display = 'flex';
                    searchInput.value = '';
                    searchResults.innerHTML = '';
                    setTimeout(() => searchInput.focus(), 50);
                } else {
                    searchContainer.style.display = 'none';
                }
            }

            if (data.action === 'show') {
                resLabel.textContent  = data.resource  || '';
                itemLabel.textContent = data.item      || '';
                panel.style.display = 'flex';
                searchContainer.style.display = 'none';
            }

            if (data.action === 'hide') {
                panel.style.display = 'none';
            }

            if (data.action === 'update') {
                stageName.textContent  = data.stageName    || '—';
                stageCount.textContent = `${data.stageIdx} / ${data.stageTotal}`;
                valX.textContent  = fmt3(data.x);
                valY.textContent  = fmt3(data.y);
                valZ.textContent  = fmt3(data.z);
                valRX.textContent = fmt1(data.rx);
                valRY.textContent = fmt1(data.ry);
                valRZ.textContent = fmt1(data.rz);
            }
        });
    </script>
</body>
</html>
