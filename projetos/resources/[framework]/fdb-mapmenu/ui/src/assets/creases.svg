<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>
  <!-- Horizontal fold -->
  <line x1="0" y1="500" x2="1000" y2="500" stroke="#3d250d" stroke-width="4" opacity="0.4" filter="url(#blur)" />
  <line x1="0" y1="500" x2="1000" y2="500" stroke="#fff" stroke-width="2" opacity="0.1" transform="translate(0, 3)" filter="url(#blur)" />
  
  <!-- Vertical fold -->
  <line x1="500" y1="0" x2="500" y2="1000" stroke="#3d250d" stroke-width="4" opacity="0.4" filter="url(#blur)" />
  <line x1="500" y1="0" x2="500" y2="1000" stroke="#fff" stroke-width="2" opacity="0.1" transform="translate(3, 0)" filter="url(#blur)" />
  
  <!-- Diagonal subtle creases -->
  <line x1="0" y1="0" x2="1000" y2="1000" stroke="#3d250d" stroke-width="2" opacity="0.2" filter="url(#blur)" />
</svg>